<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Konversi Kalender Terpadu</title>
    <style>
        body { 
            background: linear-gradient(135deg, #06241a 0%, #0e3e30 100%);
            background-attachment: fixed;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            color: #f4e1a1;
        } 
        .main-container { 
            max-width: 550px; width: 100%; 
            background: rgba(6, 36, 26, 0.95); 
            backdrop-filter: blur(15px); 
            border: 2px solid #d4af37; 
            border-radius: 25px; 
            padding: 40px 30px; 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); 
            text-align: center; box-sizing: border-box; 
        }
        h1 { color: #d4af37; font-family: 'Georgia', serif; font-size: 26px; margin: 0 0 5px 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); } 
        h2 { color: #c0c0c0; font-size: 14px; margin: 0 0 30px 0; border-bottom: 1px solid #d4af37; padding-bottom: 15px; } 
        .form-block { background: rgba(255, 255, 255, 0.05); border-radius: 15px; padding: 20px; margin-bottom: 25px; border: 1px solid rgba(212, 175, 55, 0.3); }
        .block-title { font-size: 14px; font-weight: bold; text-align: left; margin-bottom: 15px; color: #d4af37; display: flex; align-items: center; }
        .block-title::before { content: "۞"; margin-right: 10px; font-size: 18px; }
        .input-row { display: flex; gap: 12px; margin-bottom: 15px; }
        .input-group { flex: 1; text-align: left; }
        .input-group label { font-size: 10px; display: block; margin-bottom: 5px; font-weight: bold; color: #d4af37; text-transform: uppercase; } 
        .input-group input { width: 100%; padding: 10px; border: 1px solid #d4af37; border-radius: 8px; text-align: center; font-size: 16px; font-weight: bold; color: #fff; background: rgba(0,0,0,0.2); }
        button { color: #06241a; background: linear-gradient(135deg, #d4af37, #b8860b); font-weight: bold; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; margin-left: 5px; } 
        button:hover { background: #fff; transform: scale(1.05); }
        .output-box { background: rgba(212, 175, 55, 0.1); border: 1px dashed #d4af37; border-radius: 10px; padding: 15px; margin: 20px 0; color: #fff; text-align: center; line-height: 1.6; font-weight: bold; font-family: 'Courier New', Courier, monospace; }
        .footer { font-size: 12px; color: #d4af37; font-style: italic; margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(212, 175, 55, 0.3); }
        .pm-detail { color: #d4af37; font-weight: normal; font-size: 0.9em; display: block; border-top: 1px dashed #d4af37; padding-top: 8px; margin-top: 8px; }
    </style>
</head>
<body>

<div class="main-container">
    <h1>KONVERSI KALENDER</h1>
    <h2>Oleh : M. SHOLEH BAKHRUDDIN</h2>

    <div class="form-block">
        <div class="block-title">Input Tanggal Masehi</div>
        <div class="input-row">
            <div class="input-group"><label>Tgl</label><input value="20" type="number" id="tglM"></div>
            <div class="input-group"><label>Bln</label><input value="06" type="number" id="blnM"></div>
            <div class="input-group"><label>Thn</label><input value="2026" type="number" id="thnM"></div>
        </div>
        <button onclick="BtHitungM()">Proses</button> 
        <button onclick="BtHapusM()">Hapus</button> 
    </div>

    <div class="output-box" id="Hasil1">Hasil Masehi, Pranoto Mongso, & Saka muncul di sini.</div>

    <div class="form-block">
        <div class="block-title">Input Tanggal Hijriyah</div>
        <div class="input-row">
            <div class="input-group"><label>Tgl</label><input value="04" type="number" id="tglH"></div>
            <div class="input-group"><label>Bln</label><input value="01" type="number" id="blnH"></div>
            <div class="input-group"><label>Thn</label><input value="1448" type="number" id="thnH"></div>
        </div>
        <button onclick="BtHitungH()">Proses</button> 
        <button onclick="BtHapusH()">Hapus</button> 
    </div>

    <div class="output-box" id="Hasil2">Hasil Hijriyah, Pranoto Mongso, & Saka muncul di sini.</div>

    <div class="footer">_______ SEMOGA BERMANFAAT 🙏😊_______</div>
</div>

<script>
    // Data Master
    const namaHari = ["Ahad", "Senin", "Selasa", "Rabu", "Kamis", "Jum'at", "Sabtu"];
    const namaPasaran = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
    const namaBulanM = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const namaBulanH = ["", "Muharram", "Shafar", "Rabi'ul Awal", "Rabi'ul Akhir", "Jumadil Awal", "Jumadil Akhir", "Rajab", "Sya'ban", "Ramadhan", "Syawal", "Dzulqo'dah", "Dzulhijjah"];

    // Fungsi Pranoto Mongso
    function getPranotoMongso(d, m) {
        if ((m == 6 && d >= 23) || (m == 7) || (m == 8 && d <= 2)) return "Kasa: Tanah retak, waktu tepat untuk pengolahan lahan.";
        if ((m == 8 && d >= 3) && (m == 8 && d <= 25)) return "Karo: Tanah mulai merekah, tanda awal musim kering.";
        if ((m == 8 && d >= 26) || (m == 9 && d <= 18)) return "Katelu: Anak mengikuti orang tua, mulai masa tanam.";
        if ((m == 9 && d >= 19) || (m == 10 && d <= 13)) return "Kapat: Air mulai tampak, musim semi mulai tiba.";
        if ((m == 10 && d >= 14) || (m == 11 && d <= 9)) return "Kalima: Pancuran emas, awal datangnya hujan.";
        if ((m == 11 && d >= 10) || (m == 12 && d <= 22)) return "Kanem: Berlimpah buah, tanda syukur kepada alam.";
        if ((m == 12 && d >= 23) || (m == 1) || (m == 2 && d <= 3)) return "Kapitu: Musim hujan lebat/banjir, saatnya waspada.";
        if ((m == 2 && d >= 4) || (m == 3 && d <= 1)) return "Kawolu: Hewan berkembang biak, alam mulai subur.";
        if ((m == 3 && d >= 2) || (m == 3 && d <= 26)) return "Kasanga: Burung bertelur, tanda kehidupan baru.";
        if ((m == 3 && d >= 27) || (m == 4 && d <= 18)) return "Kadasa: Padi menguning, masa mendekati panen.";
        if ((m == 4 && d >= 19) || (m == 5 && d <= 12)) return "Desta: Musim panen raya, waktu kemakmuran.";
        if ((m == 5 && d >= 13) || (m == 6 && d <= 22)) return "Sada: Musim kering kembali, persiapan masa tanam baru.";
        return "Tidak Terdeteksi";
    }

    // Engine Perhitungan Julian Day
    function hitungJDMasehi(D, M, Y) {
        if (M <= 2) { Y -= 1; M += 12; }
        let A = Math.floor(Y / 100);
        let B = 2 - A + Math.floor(A / 4);
        return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + B - 1524;
    }

    function hitungJDHijri(D, M, Y) {
        return Math.floor((11 * Y + 3) / 30) + 354 * Y + 30 * M - Math.floor((M - 1) / 2) + D + 1948440 - 385;
    }

    function JDtoMasehi(JD) {
        let Z = Math.floor(JD);
        let alpha = Math.floor((Z - 1867216.25) / 36524.25);
        let A = Z < 2299161 ? Z : Z + 1 + alpha - Math.floor(alpha / 4);
        let B = A + 1524;
        let C = Math.floor((B - 122.1) / 365.25);
        let D = Math.floor(365.25 * C);
        let E = Math.floor((B - D) / 30.6001);
        return { d: B - D - Math.floor(30.6001 * E), m: E < 14 ? E - 1 : E - 13, y: (E < 14 ? E - 1 : E - 13) > 2 ? C - 4716 : C - 4715 };
    }

    function JDtoHijri(JD) {
        let H = JD - 1948440;
        let L1 = H + 10632;
        let N = Math.floor((L1 - 1) / 10631);
        let L2 = L1 - 10631 * N + 354;
        let J = Math.floor((10985 - L2) / 5316) * Math.floor((50 * L2) / 17719) + Math.floor(L2 / 5670) * Math.floor((43 * L2) / 15238);
        let L3 = L2 - Math.floor((30 - J) / 15) * Math.floor((17719 * J) / 50) - Math.floor(J / 16) * Math.floor((15238 * J) / 43) + 29;
        return { d: L3 - Math.floor((709 * Math.floor((24 * L3) / 709)) / 24), m: Math.floor((24 * L3) / 709), y: 30 * N + J - 30 };
    }

    // Fungsi Display Output
    function display(id, jd, dM, mM, yM, dH, mH, yH) {
        let hrIdx = (jd + 1) % 7; 
        let psIdx = (jd + 1) % 5;
        let tahunSaka = (mM <= 2) ? (yM - 79) : (yM - 78);
        let tahunJawa = yH + 512;
        let pm = getPranotoMongso(dM, mM);

        document.getElementById(id).innerHTML = 
            `${namaHari[hrIdx]} ${namaPasaran[psIdx]}, ${dM} ${namaBulanM[mM]} ${yM} M <br>` +
            `${dH} ${namaBulanH[mH]} ${yH} H / ${tahunSaka} Saka / ${tahunJawa} Jawa` +
            `<span class='pm-detail'>Pranoto Mongso: ${pm}</span>`;
    }

    function BtHitungM() {
        let d = parseInt(document.getElementById("tglM").value);
        let m = parseInt(document.getElementById("blnM").value);
        let y = parseInt(document.getElementById("thnM").value);
        let jd = hitungJDMasehi(d, m, y);
        let h = JDtoHijri(jd);
        display("Hasil1", jd, d, m, y, h.d, h.m, h.y);
    }

    function BtHitungH() {
        let d = parseInt(document.getElementById("tglH").value);
        let m = parseInt(document.getElementById("blnH").value);
        let y = parseInt(document.getElementById("thnH").value);
        let jd = hitungJDHijri(d, m, y);
        let masehi = JDtoMasehi(jd);
        display("Hasil2", jd, masehi.d, masehi.m, masehi.y, d, m, y);
    }

    function BtHapusM() { document.getElementById("Hasil1").innerHTML = "Data Terhapus"; }
    function BtHapusH() { document.getElementById("Hasil2").innerHTML = "Data Terhapus"; }
</script>
</body>
</html>
